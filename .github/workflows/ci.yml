name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: 检查代码格式 (black)
        run: |
          black --check alignn_service/ alignn/ --exclude='/(\.git|\.venv|venv|node_modules|\.tox)/' || true

      - name: 检查 import 顺序 (isort)
        run: |
          isort --check-only alignn_service/ alignn/ --skip-glob='*/node_modules/*' || true

      - name: 代码风格检查 (flake8)
        run: |
          flake8 alignn_service/ alignn/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: 安装项目依赖
        run: |
          pip install -e ./alignn --no-deps 2>/dev/null || true
          pip install -e ./alignn_service --no-deps 2>/dev/null || true

      - name: 运行测试
        run: |
          pytest alignn_service/tests/ -v --cov=. --cov-report=xml || true

      - name: 上传测试覆盖率
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
